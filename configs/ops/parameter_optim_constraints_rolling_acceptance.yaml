# Acceptance parameter space for Step 3.2 explicit constraint DSL.
# This file is intended for rolling_optimize acceptance runs so the in-process
# rolling_backtest_cli path can exercise constraint filtering without relying on
# the standalone backtest_cli parquet build.

composite_config_path: configs/strategies/main_backtest_strategy.yaml
target_sub_config_path: ./sub/kama_trend_production.yaml

backtest_args:
  engine_mode: parquet
  dataset_root: backtest_data/parquet_v2
  detector_config: configs/sim/ctp.yaml
  product_config_path: configs/strategies/instrument_info.json
  contract_expiry_calendar_path: configs/strategies/contract_expiry_calendar.yaml
  symbols: c
  start_date: 20240827
  end_date: 20250228
  max_ticks: 200000
  deterministic_fills: true
  strict_parquet: true
  rollover_mode: expiry_close
  rollover_price_mode: bbo
  rollover_slippage_bps: 0
  emit_trades: true
  emit_orders: false
  emit_position_history: false

optimization:
  algorithm: grid
  maximize: true
  metric_path: profit_factor
  max_trials: 4
  batch_size: 2
  preserve_top_k_trials: 4
  constraints:
    - "profit_factor > 1.1"

parameters:
  - name: kama_filter
    type: double
    values: [0.3, 0.5]
  - name: stop_loss_atr_multiplier
    type: double
    values: [3.0, 5.0]
  - name: risk_per_trade_pct
    type: double
    values: [0.003]