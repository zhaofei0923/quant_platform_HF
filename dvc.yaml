stages:
  backtest_parquet_repro:
    cmd: >-
      bash scripts/build/run_reproducible_parquet_convert_validate.sh
      --build-dir build-gcc
      --csv-path backtest_data
      --output-root runtime/backtest/parquet_v2
      --results-dir docs/results
      --skip-build false
      --clean-output true
      --require-match-existing false
      --expected-fingerprint-file ""
      --fingerprint-scope parquet
    deps:
      - backtest_data
      - src/apps/csv_to_parquet_cli_main.cpp
      - scripts/build/run_reproducible_parquet_convert_validate.sh
      - scripts/build/install_arrow_parquet_deps.sh
    outs:
      - runtime/backtest/parquet_v2
    metrics:
      - docs/results/parquet_repro_convert.json
      - docs/results/parquet_repro_validate.json
      - docs/results/parquet_repro_fingerprint.sha256
